repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Black formatter removed from pre-commit hooks.

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: no-commit-to-branch
        args: ['--branch', 'main']
        message: "Direct commits to 'main' are blocked. Please use a feature branch and submit a pull request."

      - id: check-added-large-files
  # mypy hook removed — MyPy is no longer part of the project's CI/dev checks
