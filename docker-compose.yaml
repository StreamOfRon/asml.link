version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "5000:5000"
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./scripts:/app/scripts
      - ./run.py:/app/run.py
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DEBUG=true
    command: uv run gunicorn app.main:app -k asgi --bind 0.0.0.0:5000 --reload
    restart: unless-stopped
