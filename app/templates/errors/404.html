{% extends "base.html" %}

{% block title %}Page Not Found - Link Shortener{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-screen">
    <div class="text-center">
        <div class="mb-8">
            <div class="text-6xl font-bold text-yellow-600 mb-4">404</div>
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Page Not Found</h1>
            <p class="text-lg text-gray-600 mb-6">The page you're looking for doesn't exist or has been moved.</p>
        </div>
        
        <div class="space-y-3">
            <a href="/" class="btn btn-primary" style="display: inline-block;">
                <i class="fas fa-home mr-2"></i> Go to Home
            </a>
            <br>
            <a href="/dashboard" class="btn btn-secondary" style="display: inline-block;">
                <i class="fas fa-arrow-left mr-2"></i> Go to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
