{% extends "base.html" %}

{% block title %}Server Error - Link Shortener{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-screen">
    <div class="text-center">
        <div class="mb-8">
            <div class="text-6xl font-bold text-red-600 mb-4">500</div>
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Server Error</h1>
            <p class="text-lg text-gray-600 mb-6">Something went wrong on our end. Please try again later.</p>
        </div>

        <div class="space-y-3">
            <a href="/" class="btn btn-primary" style="display: inline-block;">
                <i class="fas fa-home mr-2"></i> Go to Home
            </a>
            <br>
            <a href="/dashboard" class="btn btn-secondary" style="display: inline-block;">
                <i class="fas fa-arrow-left mr-2"></i> Go to Dashboard
            </a>
        </div>

        <div class="mt-8 p-4 bg-gray-100 rounded text-left max-w-md mx-auto">
            <p class="text-sm text-gray-700">
                <strong>Need help?</strong> If this problem persists, please contact our support team.
            </p>
        </div>
    </div>
</div>
{% endblock %}
